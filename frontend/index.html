<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Dale Finance</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#0E0F11" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="DaleFinance" />
<link rel="apple-touch-icon" href="/icons/icon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Nunito:wght@700;800&display=swap" />
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #0E0F11; --surface: #1A1C1F; --surface-2: #232629; --border: rgba(255,255,255,0.08);
  --text: #F2F3F4; --muted: #9499A0; --green: #1DB954; --red: #E24B4A; --blue: #378ADD; --amber: #E0A23B;
  --radius: 14px; --radius-sm: 9px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; min-height: 100vh; }
h1, h2, h3 { font-family: 'Nunito', sans-serif; }
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center; height: 60px; position: sticky; top: 0; z-index: 10; }
.topbar-title { font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 800; }
.topbar-title span { color: var(--green); }
.topbar-user { margin-left: auto; display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--muted); }
.nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1rem; display: flex; gap: 4px; position: sticky; top: 60px; z-index: 9; overflow-x: auto; }
.nav-btn { padding: 12px 16px; border: none; background: none; color: var(--muted); font-size: 14px; font-family: 'Inter', sans-serif; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
.nav-btn.active { color: var(--text); border-bottom-color: var(--green); }
.main { max-width: 880px; margin: 0 auto; padding: 1.5rem; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
.card-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
.btn { padding: 10px 18px; border-radius: var(--radius-sm); border: none; font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; background: var(--green); color: #06210F; transition: opacity 0.15s; }
.btn:hover { opacity: 0.9; }
.btn:disabled { opacity: 0.5; cursor: default; }
.btn-secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
.btn-sm { padding: 6px 12px; font-size: 13px; }
.btn-link { background: none; border: none; color: var(--blue); cursor: pointer; font-size: 13px; padding: 0; }
.btn-danger { background: none; border: none; color: var(--red); cursor: pointer; font-size: 13px; }
.net-worth { font-size: 40px; font-weight: 800; font-family: 'Nunito', sans-serif; }
.net-worth.green { color: var(--green); }
.net-worth.red { color: var(--red); }
.row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
.row:last-child { border-bottom: none; }
.row-main { font-weight: 600; }
.row-sub { font-size: 12px; color: var(--muted); }
.row-amount { margin-left: auto; font-weight: 600; font-size: 15px; }
.row-amount.neg { color: var(--red); }
.row-amount.pos { color: var(--green); }
.owner-tag { font-size: 11px; background: var(--surface-2); color: var(--muted); padding: 2px 8px; border-radius: 99px; margin-left: 8px; }
.empty { text-align: center; color: var(--muted); padding: 2rem; }
.loading { text-align: center; color: var(--muted); padding: 1rem; }
.chart-wrap { position: relative; height: 240px; }
.chart-wrap.sm { height: 200px; }
.acct-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; align-items: start; }
.acct-cols .card { margin-bottom: 0; }
@media (max-width: 700px) { .acct-cols { grid-template-columns: 1fr; } }
.acct-name-link { background: none; border: none; color: var(--text); font-weight: 600; cursor: pointer; padding: 0; font-family: 'Inter', sans-serif; font-size: 14px; text-align: left; }
.acct-name-link:hover { color: var(--blue); text-decoration: underline; }
.acct-icon-btn { background: none; border: none; cursor: pointer; padding: 0 4px; font-size: 13px; opacity: 0.6; }
.acct-icon-btn:hover { opacity: 1; }
.row.drag-over { border-top: 2px solid var(--blue); }
.row[draggable] { cursor: grab; }
.filter-chip { display: inline-flex; align-items: center; gap: 6px; background: rgba(55,138,221,0.15); color: var(--blue); border-radius: 99px; padding: 4px 12px; font-size: 12px; font-weight: 600; margin-bottom: 12px; }
.filter-chip button { background: none; border: none; color: var(--blue); cursor: pointer; font-size: 14px; padding: 0; line-height: 1; }
/* Budgets */
.budget-bar { height: 8px; background: var(--surface-2); border-radius: 99px; overflow: hidden; margin-top: 6px; }
.budget-fill { height: 100%; border-radius: 99px; transition: width 0.4s; }
.inline-form { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
.inline-form input, .inline-form select { padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface-2); color: var(--text); font-size: 14px; font-family: 'Inter', sans-serif; }
.inline-form input.grow { flex: 1; min-width: 140px; }
.pill { font-size: 11px; padding: 3px 10px; border-radius: 99px; font-weight: 600; }
.pill.parent { background: rgba(29,185,84,0.15); color: var(--green); }
.pill.kid { background: rgba(55,138,221,0.15); color: var(--blue); }
/* Auth */
.auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
.auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; width: 100%; max-width: 380px; }
.auth-card h2 { font-size: 24px; margin-bottom: 4px; }
.auth-card .sub { color: var(--muted); font-size: 13px; margin-bottom: 1.5rem; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.field input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface-2); color: var(--text); font-size: 14px; font-family: 'Inter', sans-serif; }
.field input:focus { outline: 2px solid var(--green); }
.auth-error { color: var(--red); font-size: 13px; margin: 8px 0; }
.auth-toggle { text-align: center; margin-top: 1rem; font-size: 13px; color: var(--muted); }
/* iOS safe areas (notch + home bar) */
.topbar { padding-top: env(safe-area-inset-top); height: calc(60px + env(safe-area-inset-top)); }
.nav { top: calc(60px + env(safe-area-inset-top)); }
body { padding-bottom: env(safe-area-inset-bottom); }
</style>
</head>
<body>
<div id="app">

  <!-- AUTH SCREEN -->
  <div v-if="!user" class="auth-wrap">
    <div class="auth-card">
      <h2>💰 Dale<span style="color:var(--green)">Finance</span></h2>
      <div class="sub">{{ mode === 'signin' ? 'Sign in to your account' : 'Create your account' }}</div>
      <div class="field" v-if="mode === 'signup'">
        <label>Name</label>
        <input v-model="form.name" type="text" placeholder="Your name" />
      </div>
      <div class="field">
        <label>Email</label>
        <input v-model="form.email" type="email" placeholder="you@example.com" @keyup.enter="submitAuth" />
      </div>
      <div class="field">
        <label>Password</label>
        <input v-model="form.password" type="password" placeholder="••••••••" @keyup.enter="submitAuth" />
      </div>
      <div v-if="authError" class="auth-error">{{ authError }}</div>
      <button class="btn" style="width:100%; margin-top:8px" @click="submitAuth" :disabled="authBusy">
        {{ authBusy ? 'Please wait…' : (mode === 'signin' ? 'Sign in' : 'Sign up') }}
      </button>
      <div class="auth-toggle">
        {{ mode === 'signin' ? "Don't have an account?" : 'Already have an account?' }}
        <button class="btn-link" @click="toggleMode">{{ mode === 'signin' ? 'Sign up' : 'Sign in' }}</button>
      </div>
    </div>
  </div>

  <!-- APP -->
  <template v-else>
    <div class="topbar">
      <div class="topbar-title">💰 Dale<span>Finance</span></div>
      <div class="topbar-user">
        <span>{{ user.role === 'parent' ? '👪 ' + user.name : '👤 ' + user.name }}</span>
        <button class="btn-link" @click="signOut">Sign out</button>
      </div>
    </div>

    <div class="nav">
      <button class="nav-btn" :class="{active: page==='dashboard'}" @click="go('dashboard')">Dashboard</button>
      <button class="nav-btn" :class="{active: page==='transactions'}" @click="go('transactions')">Transactions</button>
      <button class="nav-btn" :class="{active: page==='spending'}" @click="go('spending')">Spending</button>
      <button class="nav-btn" :class="{active: page==='budgets'}" @click="go('budgets')">Budgets</button>
      <button class="nav-btn" :class="{active: page==='projections'}" @click="go('projections')">Projections</button>
      <button v-if="user.role==='parent'" class="nav-btn" :class="{active: page==='family'}" @click="go('family')">Family</button>
    </div>

    <div class="main">

      <!-- DASHBOARD -->
      <template v-if="page==='dashboard'">
        <div v-if="txPending" class="card" style="border-color: var(--amber); background: rgba(224,162,59,0.08)">
          <div class="row-sub" style="color: var(--amber)">⏳ Transactions are still importing from your bank — this can take a minute after connecting. They'll appear automatically.</div>
        </div>
        <div class="card">
          <div class="card-title">{{ user.role === 'parent' ? 'Household net worth' : 'My net worth' }}</div>
          <div class="net-worth" :class="netWorth >= 0 ? 'green' : 'red'">{{ formatMoney(netWorth) }}</div>
          <div style="margin-top:1rem; display:flex; gap:10px;">
            <button class="btn" @click="connectBank">+ Connect bank</button>
            <button class="btn btn-secondary" @click="syncData(true)" :disabled="syncing">{{ syncing ? 'Syncing…' : 'Sync now' }}</button>
          </div>
        </div>

        <div class="card" v-if="netWorthHistory.length > 1">
          <div class="card-title">Net worth over time</div>
          <div class="chart-wrap sm"><canvas ref="nwChart"></canvas></div>
        </div>

        <div v-if="loading" class="card"><div class="loading">Loading…</div></div>
        <div v-else-if="!accounts.length" class="card"><div class="empty">No accounts yet. Connect a bank to get started.</div></div>
        <div v-else class="acct-cols">
          <div class="card" v-for="col in accountColumns" :key="col.title">
            <div class="card-title">{{ col.title }}</div>
            <div v-if="!col.list.length" class="empty" style="padding:1rem">None</div>
            <div v-else>
              <div class="row" v-for="a in col.list" :key="a.id"
                draggable="true"
                @dragstart="dragStart(a, $event)"
                @dragover="dragOver(a, $event)"
                @dragleave="dragTarget=null"
                @drop="dropOn(a, col.list, $event)"
                @dragend="dragSrc=null; dragTarget=null"
                :class="{ 'drag-over': dragTarget === a.id }"
              >
                <div>
                  <div class="row-main" style="display:flex;align-items:center;gap:4px">
                    <button class="acct-name-link" @click="viewAccountTx(a)">{{ a.name }}</button>
                    <button class="acct-icon-btn" title="View spending" @click="viewAccountSpend(a)">📊</button>
                    <span v-if="user.role==='parent' && !a.is_owner" class="owner-tag">{{ a.owner_name }}</span>
                    <span v-if="user.role!=='parent' && !a.is_owner" class="owner-tag">🔗 Shared</span>
                    <span v-if="a.is_private" class="owner-tag">🔒 Private</span>
                  </div>
                  <div class="row-sub">
                    {{ a.institution_name }} · {{ a.subtype || a.type }}
                    <button v-if="a.is_owner" class="btn-link" style="margin-left:8px" @click="togglePrivacy(a)">
                      {{ a.is_private ? 'Make visible' : 'Hide from others' }}
                    </button>
                    <button v-if="a.is_owner" class="btn-danger" style="margin-left:8px; font-size:13px" @click="disconnectBank(a)">Disconnect</button>
                  </div>
                </div>
                <div style="margin-left:auto; text-align:right">
                  <div class="row-amount" style="margin:0">{{ formatMoney(a.balance) }}</div>
                  <div v-if="acctChange(a)" class="row-sub" :style="{ color: acctChange(a).favorable ? 'var(--green)' : 'var(--red)' }">
                    {{ acctChange(a).delta >= 0 ? '▲' : '▼' }} {{ formatMoney(Math.abs(acctChange(a).delta)) }} ({{ acctChange(a).pct }})
                  </div>
                  <div v-else class="row-sub">— vs prev day</div>
                </div>
              </div>
            </div>
          </div>
        </div>

      </template>

      <!-- TRANSACTIONS -->
      <template v-if="page==='transactions'">
        <div class="card">
          <div class="card-title">{{ txAccountFilter ? txAccountFilter.name : 'All transactions' }}</div>
          <div v-if="txAccountFilter" class="filter-chip">
            {{ txAccountFilter.institution_name }} · {{ txAccountFilter.name }}
            <button @click="clearTxFilter">✕</button>
          </div>
          <div v-if="!transactions.length" class="empty">No transactions yet.</div>
          <div v-else>
            <div class="row" v-for="t in transactions" :key="t.id">
              <div>
                <div class="row-main">{{ t.merchant }}</div>
                <div class="row-sub">{{ t.account_name }}<span v-if="user.role==='parent'"> ({{ t.owner_name }})</span> · {{ formatDate(t.date) }}<span v-if="t.category"> · {{ prettyCat(t.category) }}</span></div>
              </div>
              <div class="row-amount" :class="t.amount < 0 ? 'pos' : 'neg'">{{ t.amount < 0 ? '+' : '-' }}{{ formatMoney(Math.abs(t.amount)) }}</div>
            </div>
            <button v-if="txHasMore" class="btn btn-secondary" style="width:100%; margin-top:12px" @click="loadMoreTransactions" :disabled="txLoadingMore">
              {{ txLoadingMore ? 'Loading…' : 'Load more' }}
            </button>
          </div>
        </div>
      </template>

      <!-- SPENDING -->
      <template v-if="page==='spending'">

        <!-- Monthly (interactive) or drill-down view -->
        <div class="card">
          <template v-if="!drill">
            <div class="card-title">This month — {{ spending.month }} <span style="text-transform:none; font-weight:400">(tap a category to see transactions)</span></div>
            <div v-if="spendAccountFilter" class="filter-chip">
              {{ spendAccountFilter.institution_name }} · {{ spendAccountFilter.name }}
              <button @click="clearSpendFilter">✕</button>
            </div>
            <div v-if="!spending.categories.length" class="empty">No spending recorded this month.</div>
            <template v-else>
              <div class="chart-wrap"><canvas ref="spendChart"></canvas></div>
              <div style="margin-top:1rem">
                <div class="row" style="cursor:pointer" v-for="c in spending.categories" :key="c.category" @click="drillInto(c.category)">
                  <div class="row-main">{{ prettyCat(c.category) }}</div>
                  <div class="row-sub" style="margin-left:8px">{{ c.count }} txns ›</div>
                  <div class="row-amount">{{ formatMoney(c.total) }}</div>
                </div>
              </div>
            </template>
          </template>

          <!-- Drill-down: transactions for selected category -->
          <template v-else>
            <div style="display:flex; align-items:center; margin-bottom:12px">
              <button class="btn-link" @click="exitDrill">‹ Back</button>
              <div class="card-title" style="margin:0 0 0 12px">{{ prettyCat(drill.category) }} — {{ spending.month }}</div>
            </div>
            <div v-if="drill.loading" class="loading">Loading…</div>
            <div v-else-if="!drill.txns.length" class="empty">No transactions.</div>
            <div v-else>
              <div class="row" v-for="t in drill.txns" :key="t.id">
                <div>
                  <div class="row-main">{{ t.merchant }}</div>
                  <div class="row-sub">{{ t.account_name }}<span v-if="user.role==='parent'"> ({{ t.owner_name }})</span> · {{ formatDate(t.date) }}</div>
                </div>
                <div class="row-amount" :class="t.amount < 0 ? 'pos' : 'neg'">{{ t.amount < 0 ? '+' : '-' }}{{ formatMoney(Math.abs(t.amount)) }}</div>
              </div>
            </div>
          </template>
        </div>

        <!-- Yearly: category breakdown -->
        <div class="card">
          <div class="card-title">This year by category — {{ yearly.year }}</div>
          <div v-if="!yearly.categories.length" class="empty">No spending recorded this year.</div>
          <div v-else class="chart-wrap"><canvas ref="yearCatChart"></canvas></div>
        </div>

        <!-- Yearly: monthly totals trend -->
        <div class="card">
          <div class="card-title">Monthly totals — {{ yearly.year }}</div>
          <div v-if="!yearly.monthly.length" class="empty">No spending recorded this year.</div>
          <div v-else class="chart-wrap"><canvas ref="yearTrendChart"></canvas></div>
        </div>
      </template>

      <!-- BUDGETS -->
      <template v-if="page==='budgets'">
        <div class="card">
          <div class="card-title">Monthly budgets</div>
          <div v-if="!budgets.length" class="empty">No budgets set{{ user.role==='parent' ? ' — add one below.' : ' yet.' }}</div>
          <div v-else>
            <div v-for="b in budgets" :key="b.id" style="margin-bottom:16px">
              <div style="display:flex; align-items:center">
                <div class="row-main">{{ prettyCat(b.category) }}</div>
                <div class="row-amount" style="font-size:14px">{{ formatMoney(b.spent) }} / {{ formatMoney(b.amount) }}</div>
                <button v-if="user.role==='parent'" class="btn-danger" style="margin-left:12px" @click="deleteBudget(b.id)">Remove</button>
              </div>
              <div class="budget-bar">
                <div class="budget-fill" :style="{ width: Math.min(100, b.spent/b.amount*100) + '%', background: b.spent > b.amount ? 'var(--red)' : 'var(--green)' }"></div>
              </div>
            </div>
          </div>
          <div v-if="user.role==='parent'" class="inline-form">
            <select v-model="newBudget.category">
              <option value="">Category…</option>
              <option v-for="c in budgetCategoryOptions" :key="c" :value="c">{{ prettyCat(c) }}</option>
            </select>
            <input class="grow" v-model.number="newBudget.amount" type="number" placeholder="Monthly limit ($)" />
            <button class="btn btn-sm" @click="saveBudget" :disabled="!newBudget.category || !newBudget.amount">Add budget</button>
          </div>
        </div>
      </template>

      <!-- PROJECTIONS -->
      <template v-if="page==='projections'">
        <div class="card">
          <div class="card-title">Projected available balance — through {{ projection.endOfMonth }}</div>
          <div class="row-sub" style="margin-bottom:8px">Estimated from the last 30 days of activity on checking/savings accounts.</div>
          <div v-if="!projection.accounts.length" class="empty">No checking or savings accounts to project.</div>
          <template v-else>
            <div class="net-worth" :class="projectedTotal >= 0 ? 'green' : 'red'">{{ formatMoney(projectedTotal) }}</div>
            <div class="row-sub">projected by end of month (now: {{ formatMoney(currentTotal) }})</div>
            <div class="chart-wrap sm" style="margin-top:1rem"><canvas ref="projChart"></canvas></div>
          </template>
        </div>

        <div class="card" v-if="projection.accounts.length">
          <div class="card-title">By account</div>
          <div class="row" v-for="a in projection.accounts" :key="a.id">
            <div>
              <div class="row-main">{{ a.name }}</div>
              <div class="row-sub">{{ a.dailyNet >= 0 ? '+' : '' }}{{ formatMoney(a.dailyNet) }}/day trend</div>
            </div>
            <div style="margin-left:auto; text-align:right">
              <div class="row-amount" style="margin:0">{{ formatMoney(a.projectedEnd) }}</div>
              <div class="row-sub" :style="{ color: a.projectedEnd >= a.current ? 'var(--green)' : 'var(--red)' }">
                from {{ formatMoney(a.current) }} now
              </div>
            </div>
          </div>
        </div>
      </template>

      <!-- FAMILY (parent only) -->
      <template v-if="page==='family' && user.role==='parent'">
        <div class="card">
          <div class="card-title">Household members</div>
          <div v-if="!family.length" class="loading">Loading…</div>
          <div v-else>
            <div class="row" v-for="m in family" :key="m.id">
              <div>
                <div class="row-main">{{ m.name }} <span class="pill" :class="m.role">{{ m.role }}</span></div>
                <div class="row-sub">{{ m.email }}</div>
              </div>
              <div style="margin-left:auto; display:flex; gap:8px; align-items:center">
                <button v-if="m.id !== user.id" class="btn btn-secondary btn-sm" @click="openShares(m)">Share accounts</button>
                <button v-if="m.id !== user.id" class="btn btn-secondary btn-sm" @click="changeRole(m)">
                  Make {{ m.role === 'parent' ? 'kid' : 'parent' }}
                </button>
                <span v-else class="row-sub">You</span>
              </div>
            </div>
          </div>

          <!-- Share accounts panel -->
          <div v-if="sharingFor" style="margin-top:1rem; padding-top:1rem; border-top:1px solid var(--border)">
            <div class="card-title">Accounts shared with {{ sharingFor.name }}</div>
            <div class="row-sub" style="margin-bottom:8px">Checked accounts appear on {{ sharingFor.name }}'s dashboard and count toward their totals.</div>
            <div v-if="shareAccounts === null" class="loading">Loading…</div>
            <div v-else-if="!shareAccounts.length" class="empty">No accounts available to share.</div>
            <div v-else>
              <label v-for="a in shareAccounts" :key="a.id" style="display:flex; align-items:center; gap:10px; padding:8px 0; cursor:pointer">
                <input type="checkbox" v-model="a.shared" />
                <span class="row-main">{{ a.name }}</span>
                <span class="row-sub">{{ a.institution_name }} · {{ a.owner_name }}</span>
              </label>
              <div style="display:flex; gap:8px; margin-top:12px">
                <button class="btn btn-sm" @click="saveShares" :disabled="shareSaving">{{ shareSaving ? 'Saving…' : 'Save' }}</button>
                <button class="btn btn-secondary btn-sm" @click="sharingFor=null">Cancel</button>
              </div>
            </div>
          </div>
          <div class="card-title" style="margin-top:1.5rem">Invite a member</div>
          <div class="row-sub">Pre-authorize an email. Only invited people can sign up — works whether or not they have an account yet.</div>
          <div class="inline-form">
            <input class="grow" v-model="newMember.email" type="email" placeholder="their@email.com" />
            <select v-model="newMember.role">
              <option value="kid">Kid</option>
              <option value="parent">Parent</option>
            </select>
            <button class="btn btn-sm" @click="inviteMember" :disabled="!newMember.email">Invite</button>
          </div>
          <div v-if="familyMsg" class="row-sub" style="margin-top:8px; color: var(--amber)">{{ familyMsg }}</div>

          <template v-if="invites.length">
            <div class="card-title" style="margin-top:1.5rem">Pending invitations</div>
            <div class="row" v-for="inv in invites" :key="inv.email">
              <div>
                <div class="row-main">{{ inv.email }} <span class="pill" :class="inv.role">{{ inv.role }}</span></div>
                <div class="row-sub">Hasn't signed up yet</div>
              </div>
              <button class="btn-danger" style="margin-left:auto" @click="revokeInvite(inv.email)">Revoke</button>
            </div>
          </template>
        </div>
      </template>

    </div>
  </template>
</div>

<script>
const { createApp } = Vue;
const TX_PAGE = 50;
const isLocal = ['localhost', '127.0.0.1'].includes(location.hostname);
const API = isLocal ? 'http://localhost:3000' : 'https://dale-finance-api-16tc.onrender.com';
const AUTH = 'https://ep-old-lake-aj5crn6m.neonauth.c-3.us-east-2.aws.neon.tech/neondb/auth';

createApp({
  data() {
    return {
      user: null, jwt: null, page: 'dashboard',
      mode: 'signin', form: { name: '', email: '', password: '' }, authError: '', authBusy: false,
      accounts: [], transactions: [], loading: true, syncing: false,
      txHasMore: true, txLoadingMore: false,
      txPending: false, txRetries: 0,
      txAccountFilter: null, spendAccountFilter: null,
      accountOrder: {}, dragSrc: null, dragTarget: null,
      spending: { month: '', categories: [] },
      yearly: { year: '', categories: [], monthly: [] },
      projection: { asOf: '', endOfMonth: '', accounts: [], series: [] },
      drill: null,
      netWorthHistory: [],
      budgets: [], newBudget: { category: '', amount: null },
      family: [], invites: [], newMember: { email: '', role: 'kid' }, familyMsg: '',
      sharingFor: null, shareAccounts: null, shareSaving: false,
      charts: {},
      palette: ['#1DB954','#378ADD','#E0A23B','#E24B4A','#7F77DD','#3BB5A0','#C957B5','#888780','#D9774B','#5FA8D3'],
    };
  },
  computed: {
    netWorth() {
      return this.accounts.reduce((sum, a) => {
        const v = Number(a.balance || 0);
        return sum + (['loan', 'credit'].includes(a.type) ? -v : v);
      }, 0);
    },
    accountColumns() {
      const isChecking = a => a.type === 'depository' && (a.subtype === 'checking' || a.subtype === 'cash management');
      const isSavingsInvest = a => (a.type === 'depository' && !isChecking(a)) || a.type === 'investment';
      const byOrder = (a, b) => (this.accountOrder[a.id] ?? 999) - (this.accountOrder[b.id] ?? 999);
      return [
        { title: 'Checking', list: this.accounts.filter(isChecking).sort(byOrder) },
        { title: 'Savings & Investments', list: this.accounts.filter(isSavingsInvest).sort(byOrder) },
      ];
    },
    currentTotal() { return this.projection.accounts.reduce((s, a) => s + a.current, 0); },
    projectedTotal() { return this.projection.accounts.reduce((s, a) => s + a.projectedEnd, 0); },
    budgetCategoryOptions() {
      const fromTx = this.spending.categories.map(c => c.category);
      const common = ['FOOD_AND_DRINK','GENERAL_MERCHANDISE','TRANSPORTATION','RENT_AND_UTILITIES','ENTERTAINMENT','PERSONAL_CARE','TRAVEL','LOAN_PAYMENTS'];
      return [...new Set([...common, ...fromTx])];
    }
  },
  methods: {
    formatMoney(n) { return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(n || 0); },
    formatDate(d) { return new Date(d).toLocaleDateString(); },
    prettyCat(c) { return (c || 'Uncategorized').replace(/_/g, ' ').toLowerCase().replace(/\b\w/g, l => l.toUpperCase()); },
    acctChange(a) {
      if (a.prev_balance == null) return null;
      const prev = Number(a.prev_balance);
      const delta = Number(a.balance) - prev;
      const pct = prev !== 0 ? (delta / Math.abs(prev) * 100).toFixed(1) + '%' : '—';
      // For debt accounts (credit/loan), a rising balance is unfavorable
      const isDebt = ['credit', 'loan'].includes(a.type);
      const favorable = isDebt ? delta <= 0 : delta >= 0;
      return { delta, pct, favorable };
    },

    // --- Navigation ---
    go(page) {
      this.page = page;
      if (page === 'spending') this.loadSpending();
      if (page === 'budgets') this.loadBudgets();
      if (page === 'projections') this.loadProjection();
      if (page === 'family') this.loadFamily();
      if (page === 'dashboard') this.$nextTick(() => this.renderNetWorthChart());
    },
    viewAccountTx(a) {
      this.txAccountFilter = a;
      this.transactions = [];
      this.txHasMore = true;
      this.page = 'transactions';
      this.loadFilteredTransactions();
    },
    viewAccountSpend(a) {
      this.spendAccountFilter = a;
      this.page = 'spending';
      this.loadSpending();
    },
    clearTxFilter() {
      this.txAccountFilter = null;
      this.transactions = [];
      this.txHasMore = true;
      this.loadFilteredTransactions();
    },
    clearSpendFilter() {
      this.spendAccountFilter = null;
      this.loadSpending();
    },
    async loadFilteredTransactions() {
      try {
        const acctParam = this.txAccountFilter ? `&account_id=${this.txAccountFilter.id}` : '';
        const tx = await this.apiGet(`/api/accounts/transactions?limit=${TX_PAGE}&offset=0${acctParam}`);
        this.transactions = tx;
        this.txHasMore = tx.length === TX_PAGE;
      } catch (e) { console.error(e); }
    },
    // --- Drag to reorder accounts ---
    dragStart(a, e) {
      this.dragSrc = a;
      e.dataTransfer.effectAllowed = 'move';
    },
    dragOver(a, e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      this.dragTarget = a.id;
    },
    dropOn(a, colList, e) {
      e.preventDefault();
      if (!this.dragSrc || this.dragSrc.id === a.id) { this.dragTarget = null; return; }
      const srcIdx = colList.findIndex(x => x.id === this.dragSrc.id);
      const dstIdx = colList.findIndex(x => x.id === a.id);
      if (srcIdx === -1 || dstIdx === -1) { this.dragTarget = null; return; }
      // Reorder within the column
      const reordered = [...colList];
      reordered.splice(srcIdx, 1);
      reordered.splice(dstIdx, 0, this.dragSrc);
      reordered.forEach((x, i) => { this.accountOrder[x.id] = i; });
      localStorage.setItem('df_account_order', JSON.stringify(this.accountOrder));
      this.dragSrc = null; this.dragTarget = null;
    },

    // --- Auth ---
    toggleMode() { this.mode = this.mode === 'signin' ? 'signup' : 'signin'; this.authError = ''; },
    async submitAuth() {
      this.authError = ''; this.authBusy = true;
      try {
        const endpoint = this.mode === 'signin' ? '/sign-in/email' : '/sign-up/email';
        const body = this.mode === 'signin'
          ? { email: this.form.email, password: this.form.password }
          : { email: this.form.email, password: this.form.password, name: this.form.name };
        const res = await fetch(AUTH + endpoint, { method: 'POST', credentials: 'include', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.message || 'Authentication failed'); }
        await this.loadSession();
      } catch (e) { this.authError = e.message; }
      this.authBusy = false;
    },
    async fetchToken() {
      const res = await fetch(AUTH + '/token', { credentials: 'include' });
      if (!res.ok) return null;
      const { token } = await res.json();
      return token;
    },
    async loadSession() {
      const token = await this.fetchToken();
      if (!token) { this.user = null; return; }
      this.jwt = token;
      try {
        this.user = await this.apiGet('/api/accounts/me');
      } catch (e) {
        // Blocked by the invite-only gate (or any /me failure) — clear the session and surface it
        await this.signOut();
        throw e;
      }
      await this.loadData();
      // Auto-sync in the background on every login so data + net-worth snapshot stay fresh.
      // Fire-and-forget: cached data shows immediately, then refreshes when sync completes.
      if (this.accounts.length) this.syncData();
    },
    async signOut() {
      await fetch(AUTH + '/sign-out', { method: 'POST', credentials: 'include' }).catch(() => {});
      this.user = null; this.jwt = null; this.accounts = []; this.transactions = [];
    },

    // --- API helper ---
    apiGet(p) { return this.apiCall('GET', p); },
    apiPost(p, b) { return this.apiCall('POST', p, b); },
    apiDelete(p) { return this.apiCall('DELETE', p); },
    apiPatch(p, b) { return this.apiCall('PATCH', p, b); },
    async apiCall(method, path, body, retried) {
      const res = await fetch(API + path, {
        method, headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${this.jwt}` },
        body: body ? JSON.stringify(body) : undefined
      });
      if (res.status === 401 && !retried) {
        const fresh = await this.fetchToken();
        if (fresh) { this.jwt = fresh; return this.apiCall(method, path, body, true); }
        this.user = null; throw new Error('Session expired');
      }
      if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.message || e.error || 'Request failed'); }
      return res.json();
    },

    // --- Dashboard data ---
    async loadData() {
      this.loading = true;
      try {
        this.accountOrder = JSON.parse(localStorage.getItem('df_account_order') || '{}');
        const [acc, tx, nw] = await Promise.all([
          this.apiGet('/api/accounts'),
          this.apiGet(`/api/accounts/transactions?limit=${TX_PAGE}&offset=0`),
          this.apiGet('/api/analytics/net-worth?days=180')
        ]);
        this.accounts = acc; this.transactions = tx; this.netWorthHistory = nw.history;
        this.txHasMore = tx.length === TX_PAGE;
        this.$nextTick(() => this.renderNetWorthChart());
      } catch (e) { console.error(e); }
      this.loading = false;
    },
    async togglePrivacy(a) {
      try {
        await this.apiPatch(`/api/accounts/${a.id}/privacy`, { is_private: !a.is_private });
        a.is_private = !a.is_private;
      } catch (e) { alert(e.message); }
    },
    async disconnectBank(a) {
      const sameBank = this.accounts.filter(x => x.plaid_item_id === a.plaid_item_id && x.is_owner);
      const msg = sameBank.length > 1
        ? `Disconnect ${a.institution_name}? This removes all ${sameBank.length} of its accounts and their history. This can't be undone.`
        : `Disconnect ${a.institution_name} (${a.name})? This removes the account and its history. This can't be undone.`;
      if (!confirm(msg)) return;
      try {
        await this.apiDelete(`/api/plaid/item/${a.plaid_item_id}`);
        await this.loadData();
      } catch (e) { alert(e.message); }
    },
    async loadMoreTransactions() {
      this.txLoadingMore = true;
      try {
        const acctParam = this.txAccountFilter ? `&account_id=${this.txAccountFilter.id}` : '';
        const more = await this.apiGet(`/api/accounts/transactions?limit=${TX_PAGE}&offset=${this.transactions.length}${acctParam}`);
        this.transactions = this.transactions.concat(more);
        this.txHasMore = more.length === TX_PAGE;
      } catch (e) { console.error(e); }
      this.txLoadingMore = false;
    },
    async connectBank() {
      const { link_token } = await this.apiPost('/api/plaid/create-link-token', {});
      Plaid.create({
        token: link_token,
        onSuccess: async (publicToken, metadata) => {
          await this.apiPost('/api/plaid/exchange-token', { publicToken, institutionName: metadata.institution?.name || 'Bank' });
          await this.syncData(true);
        }
      }).open();
    },
    async syncData(force = false) {
      this.syncing = true;
      try {
        const r = await this.apiPost('/api/plaid/sync', { force });
        await this.loadData();
        this.txPending = !!r.transactionsPending;
        // Right after linking, Plaid needs a moment to prepare transactions — retry a few times (forced, to bypass the daily throttle)
        if (this.txPending && this.txRetries < 3) {
          this.txRetries++;
          setTimeout(() => this.syncData(true), 10000);
        } else if (!this.txPending) {
          this.txRetries = 0;
        }
      } catch (e) { console.error(e); }
      this.syncing = false;
    },

    // --- Spending ---
    async loadSpending() {
      try {
        const acctParam = this.spendAccountFilter ? `&account_id=${this.spendAccountFilter.id}` : '';
        const [month, year] = await Promise.all([
          this.apiGet(`/api/analytics/spending?${acctParam}`),
          this.apiGet(`/api/analytics/spending/yearly?${acctParam}`)
        ]);
        this.spending = month;
        this.yearly = year;
        this.drill = null;
        this.$nextTick(() => { this.renderSpendChart(); this.renderYearCatChart(); this.renderYearTrendChart(); });
      } catch (e) { console.error(e); }
    },
    async drillInto(category) {
      this.drill = { category, txns: [], loading: true };
      try {
        this.drill.txns = await this.apiGet(`/api/accounts/transactions?category=${encodeURIComponent(category)}&month=${this.spending.month}&limit=200`);
      } catch (e) { console.error(e); }
      this.drill.loading = false;
    },
    exitDrill() {
      this.drill = null;
      this.$nextTick(() => this.renderSpendChart());
    },

    // --- Projections ---
    async loadProjection() {
      try {
        this.projection = await this.apiGet('/api/analytics/projection');
        this.$nextTick(() => this.renderProjChart());
      } catch (e) { console.error(e); }
    },

    // --- Budgets ---
    async loadBudgets() {
      try { this.budgets = await this.apiGet('/api/budgets'); if (!this.spending.categories.length) await this.loadSpending(); } catch (e) { console.error(e); }
    },
    async saveBudget() {
      try {
        await this.apiPost('/api/budgets', { category: this.newBudget.category, amount: this.newBudget.amount });
        this.newBudget = { category: '', amount: null };
        await this.loadBudgets();
      } catch (e) { alert(e.message); }
    },
    async deleteBudget(id) {
      try { await this.apiDelete('/api/budgets/' + id); await this.loadBudgets(); } catch (e) { alert(e.message); }
    },

    // --- Family ---
    async loadFamily() {
      try {
        const [fam, inv] = await Promise.all([this.apiGet('/api/family'), this.apiGet('/api/family/invites')]);
        this.family = fam; this.invites = inv;
      } catch (e) { console.error(e); }
    },
    async inviteMember() {
      this.familyMsg = '';
      try {
        const r = await this.apiPost('/api/family/invite', { email: this.newMember.email, role: this.newMember.role });
        this.familyMsg = r.status === 'added'
          ? 'Member added — they already had an account.'
          : 'Invitation sent — they can now sign up with that email.';
        this.newMember = { email: '', role: 'kid' };
        await this.loadFamily();
      } catch (e) { this.familyMsg = e.message; }
    },
    async revokeInvite(email) {
      try { await this.apiDelete('/api/family/invite/' + encodeURIComponent(email)); await this.loadFamily(); } catch (e) { alert(e.message); }
    },
    async changeRole(m) {
      const role = m.role === 'parent' ? 'kid' : 'parent';
      try { await this.apiPatch('/api/family/' + m.id + '/role', { role }); await this.loadFamily(); } catch (e) { alert(e.message); }
    },
    async openShares(m) {
      this.sharingFor = m; this.shareAccounts = null;
      try { this.shareAccounts = await this.apiGet('/api/family/' + m.id + '/shares'); } catch (e) { this.shareAccounts = []; console.error(e); }
    },
    async saveShares() {
      this.shareSaving = true;
      try {
        const accountIds = this.shareAccounts.filter(a => a.shared).map(a => a.id);
        await this.apiCall('PUT', '/api/family/' + this.sharingFor.id + '/shares', { accountIds });
        this.sharingFor = null;
      } catch (e) { alert(e.message); }
      this.shareSaving = false;
    },

    // --- Charts ---
    renderNetWorthChart() {
      const el = this.$refs.nwChart;
      if (!el || this.netWorthHistory.length < 2) return;
      if (this.charts.nw) this.charts.nw.destroy();
      this.charts.nw = new Chart(el.getContext('2d'), {
        type: 'line',
        data: {
          labels: this.netWorthHistory.map(h => new Date(h.date).toLocaleDateString(undefined, { month: 'short', day: 'numeric' })),
          datasets: [{ data: this.netWorthHistory.map(h => Number(h.net_worth)), borderColor: '#1DB954', backgroundColor: 'rgba(29,185,84,0.1)', fill: true, tension: 0.3, pointRadius: 2 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
          scales: { y: { ticks: { color: '#9499A0' }, grid: { color: 'rgba(255,255,255,0.05)' } }, x: { ticks: { color: '#9499A0' }, grid: { display: false } } } }
      });
    },
    renderSpendChart() {
      const el = this.$refs.spendChart;
      if (!el || !this.spending.categories.length) return;
      if (this.charts.spend) this.charts.spend.destroy();
      const cats = this.spending.categories;
      this.charts.spend = new Chart(el.getContext('2d'), {
        type: 'doughnut',
        data: {
          labels: cats.map(c => this.prettyCat(c.category)),
          datasets: [{ data: cats.map(c => Number(c.total)), backgroundColor: this.palette, borderColor: '#1A1C1F', borderWidth: 2 }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          onClick: (evt, els) => { if (els.length) this.drillInto(cats[els[0].index].category); },
          onHover: (evt, els) => { evt.native.target.style.cursor = els.length ? 'pointer' : 'default'; },
          plugins: { legend: { position: 'right', labels: { color: '#F2F3F4', font: { size: 11 }, boxWidth: 12 } } }
        }
      });
    },
    renderYearCatChart() {
      const el = this.$refs.yearCatChart;
      if (!el || !this.yearly.categories.length) return;
      if (this.charts.yearCat) this.charts.yearCat.destroy();
      const cats = this.yearly.categories;
      this.charts.yearCat = new Chart(el.getContext('2d'), {
        type: 'doughnut',
        data: {
          labels: cats.map(c => this.prettyCat(c.category)),
          datasets: [{ data: cats.map(c => Number(c.total)), backgroundColor: this.palette, borderColor: '#1A1C1F', borderWidth: 2 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#F2F3F4', font: { size: 11 }, boxWidth: 12 } } } }
      });
    },
    renderProjChart() {
      const el = this.$refs.projChart;
      if (!el || !this.projection.series.length) return;
      if (this.charts.proj) this.charts.proj.destroy();
      this.charts.proj = new Chart(el.getContext('2d'), {
        type: 'line',
        data: {
          labels: this.projection.series.map(p => new Date(p.date).toLocaleDateString(undefined, { month: 'short', day: 'numeric' })),
          datasets: [{ data: this.projection.series.map(p => p.total), borderColor: '#E0A23B', backgroundColor: 'rgba(224,162,59,0.1)', fill: true, tension: 0.2, pointRadius: 0, borderDash: [5, 4] }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
          scales: { y: { ticks: { color: '#9499A0' }, grid: { color: 'rgba(255,255,255,0.05)' } }, x: { ticks: { color: '#9499A0', maxTicksLimit: 8 }, grid: { display: false } } } }
      });
    },
    renderYearTrendChart() {
      const el = this.$refs.yearTrendChart;
      if (!el || !this.yearly.monthly.length) return;
      if (this.charts.yearTrend) this.charts.yearTrend.destroy();
      const names = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const byMonth = {};
      this.yearly.monthly.forEach(m => { byMonth[Number(m.month)] = Number(m.total); });
      const data = names.map((_, i) => byMonth[i + 1] || 0);
      this.charts.yearTrend = new Chart(el.getContext('2d'), {
        type: 'bar',
        data: { labels: names, datasets: [{ data, backgroundColor: '#378ADD', borderRadius: 4 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
          scales: { y: { ticks: { color: '#9499A0' }, grid: { color: 'rgba(255,255,255,0.05)' } }, x: { ticks: { color: '#9499A0' }, grid: { display: false } } } }
      });
    }
  },
  async mounted() {
    try { await this.loadSession(); } catch (e) { this.user = null; }
    this.loading = false;
  }
}).mount('#app');
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
}
</script>
</body>
</html>
